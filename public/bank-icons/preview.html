<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bank Marker Preview</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #eef3f7;
      color: #17202b;
      font-family: Arial, "Microsoft YaHei", sans-serif;
    }

    main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 32px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 26px;
    }

    p {
      margin: 0 0 24px;
      color: #667386;
      font-size: 14px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 14px;
    }

    .card {
      min-height: 154px;
      padding: 16px;
      border: 1px solid #dde7ef;
      border-radius: 8px;
      background: rgba(255, 255, 255, .94);
      box-shadow: 0 8px 24px rgba(23, 32, 43, .08);
    }

    .name {
      margin-bottom: 14px;
      color: #17202b;
      font-size: 15px;
      font-weight: 700;
    }

    .icons {
      display: flex;
      align-items: end;
      gap: 16px;
      min-height: 88px;
    }

    .item {
      display: grid;
      justify-items: center;
      gap: 6px;
      color: #667386;
      font-size: 11px;
    }

    .map {
      position: relative;
      min-height: 360px;
      margin-top: 32px;
      overflow: hidden;
      border: 1px solid #d5e0e9;
      border-radius: 10px;
      background:
        linear-gradient(24deg, transparent 0 30%, rgba(255,255,255,.72) 30% 32%, transparent 32%),
        linear-gradient(112deg, transparent 0 46%, rgba(255,255,255,.72) 46% 48%, transparent 48%),
        linear-gradient(0deg, rgba(194,221,239,.65) 56%, transparent 56%),
        #e4edf4;
    }

    .map img {
      position: absolute;
    }
  </style>
</head>
<body>
  <main>
    <h1>银行地图点位图标预览</h1>
    <p>这个页面不依赖 fetch，直接双击打开也能预览。优先展示官方 logo 版，没有官方 SVG 的银行使用品牌简称版。</p>
    <section id="grid" class="grid"></section>
    <section id="map" class="map"></section>
  </main>

  <script>
    const banks = [
      { id: 'boc', name: '中国银行', code: 'BOC', official: true },
      { id: 'icbc', name: '工商银行', code: 'ICBC', official: true },
      { id: 'ccb', name: '建设银行', code: 'CCB', official: true },
      { id: 'abc', name: '农业银行', code: 'ABC', official: true },
      { id: 'cdb', name: '国家开发银行', code: 'CDB', official: true },
      { id: 'psbc', name: '邮储银行', code: 'PSBC', official: true },
      { id: 'adbc', name: '中国农业发展银行', code: 'ADBC', official: false }
    ]

    const grid = document.querySelector('#grid')
    const map = document.querySelector('#map')

    banks.forEach((bank, index) => {
      const marker = bank.official ? `./${bank.id}-official.svg` : `./${bank.id}.svg`
      const selected = bank.official ? `./${bank.id}-official-selected.svg` : `./${bank.id}-selected.svg`

      const card = document.createElement('article')
      card.className = 'card'
      card.innerHTML = `
        <div class="name">${bank.name}</div>
        <div class="icons">
          <div class="item"><img src="${marker}" width="56" height="64" alt="${bank.name}默认态"><span>默认</span></div>
          <div class="item"><img src="${selected}" width="76" height="84" alt="${bank.name}选中态"><span>选中</span></div>
        </div>
      `
      grid.appendChild(card)

      const img = document.createElement('img')
      img.src = index % 5 === 0 ? selected : marker
      img.width = index % 5 === 0 ? 76 : 56
      img.height = index % 5 === 0 ? 84 : 64
      img.alt = bank.name
      img.style.left = `${60 + (index % 6) * 172 + (index % 2) * 20}px`
      img.style.top = `${46 + Math.floor(index / 6) * 136 + (index % 3) * 14}px`
      map.appendChild(img)
    })
  </script>
</body>
</html>
